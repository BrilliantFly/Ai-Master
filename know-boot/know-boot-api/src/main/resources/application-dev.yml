server:
  port: 9002
  servlet:
    context-path: /api

spring:
  #easypoi启用覆盖,否则一下错误（nacos中单独配置，配置nacos中会启动报错）
  # A bean with that name has already been defined in class path resource
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  redis:
    #redis数据库索引(默认为0)
    database: 0
    #redis服务器地址
    host: 121.41.107.198
    #redis服务器连接端口
    port: 10001
    #redis连接密码
    password: 123456789
    lettuce:
      pool:
        # 连接池最大连接数（使用负值表示没有限制） 默认 8
        max-active: 16
        # 连接池最大阻塞等待时间（使用负值表示没有限制） 默认 -1
        max-wait: 60000
        # 连接池中的最大空闲连接 默认 8
        max-idle: 10
        # 连接池中的最小空闲连接 默认 0
        min-idle: 3

logging:
  config:
    classpath: logback-spring.xml
  logback-spring:
    path: D:\var\logs\system
    filename: system
    max-history: 100

# 自动以starter
know:
  applet:
    appId: wx3214312c96970f1f
    appSecert: f30d9a639461238f3f5c6b91a881c1b1
  #限流器QPS设置
  rateLimiter:
    all:
      #每秒生成令牌个数
      permitsPerSecond: 1
      #在warmupPeriod时间内RateLimiter会增加它的速率，在抵达它的稳定速率或者最大速率之前
      warmupPeriod: 1
    resource:
      permitsPerSecond: 1
      warmupPeriod: 1
    interface:
      permitsPerSecond: 1
      warmupPeriod: 1
  ignore:
    urls:
      - ${server.servlet.context-path}/sys/user/**
  redisson:
    address: redis://${spring.redis.host}:${spring.redis.port}